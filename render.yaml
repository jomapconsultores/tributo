services:
  # ---------- Backend (FastAPI) ----------
  - type: web
    name: tributos-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false           # se define en el dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false           # ej: https://tributos-web.onrender.com
      - key: FRONTEND_URL
        sync: false           # ej: https://tributos-web.onrender.com
      # --- Movimientos: aviso por correo al administrador ---
      - key: ACTIVITY_NOTIFY_EMAIL
        value: jomapconsultores@gmail.com   # destino del aviso (no es secreto)
      # SMTP para el envío real (definir en el dashboard de Render):
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false

  # ---------- Frontend (React/Vite, sitio estático) ----------
  - type: static
    name: tributos-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false           # ej: https://tributos-api.onrender.com
    routes:
      - type: rewrite         # SPA: todas las rutas → index.html
        source: /*
        destination: /index.html
