name: Mantener backend despierto

# El plan gratis de Render duerme el servicio tras ~15 min sin uso y el primer
# acceso tarda 30-60s en despertar. Este job lo "pinguea" cada 10 minutos en
# horario laboral de Ecuador (UTC-5) para que esté siempre caliente y rápido.
# Fuera de ese horario se deja dormir para no agotar las horas gratuitas.

on:
  schedule:
    # Cada 10 min, 11:00-23:59 UTC = 06:00-18:59 en Ecuador, todos los días
    - cron: '*/10 11-23 * * *'
  workflow_dispatch: {}   # permite ejecutarlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Despertar el backend
        run: |
          for i in 1 2 3; do
            if curl -fsS --max-time 70 https://tributos-api.onrender.com/ ; then
              echo "Backend despierto"; exit 0
            fi
            echo "Reintentando (arrancando en frio)..."; sleep 15
          done
          echo "No respondio aun; el proximo ping lo reintenta"; exit 0
